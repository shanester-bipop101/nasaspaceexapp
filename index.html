<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Space Explorer — Astronomy Picture of the Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="https://gpm.nasa.gov/sites/default/files/document_files/NASA-Logo-Large.png" alt="NASA logo" class="nasa-logo" />
        <div class="brand-text">
          <h1>Space Explorer</h1>
          <p class="tagline">Astronomy Picture of the Day Gallery</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Random "Did You Know?" fact — filled in by JS on page load -->
  <section class="fact-banner" id="factBanner">
    <span class="fact-label">Did You Know?</span>
    <span class="fact-text" id="factText"></span>
  </section>

  <main class="container">

    <section class="controls">
      <div class="date-picker">
        <label for="startDate">Start date</label>
        <input type="date" id="startDate" />
      </div>
      <button id="fetchBtn" class="fetch-btn">Get 9 Days of Images</button>
    </section>

    <!-- Loading message (hidden by default, shown while fetching) -->
    <div class="loading" id="loading" hidden>
      <div class="spinner"></div>
      <p>🚀 Loading space photos…</p>
    </div>

    <!-- Gallery items are created dynamically by script.js -->
    <section class="gallery" id="gallery">
      <div class="placeholder" id="placeholder">
        <p>🔭 Pick a start date and press the button to explore 9 days of the cosmos.</p>
      </div>
    </section>

  </main>

  <!-- Modal (hidden by default) -->
  <div class="modal-overlay" id="modal" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-media" id="modalMedia"></div>
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <p class="modal-date" id="modalDate"></p>
        <p class="modal-explanation" id="modalExplanation"></p>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Imagery courtesy of the <a href="https://apod.nasa.gov/apod/" target="_blank" rel="noopener">NASA Astronomy Picture of the Day</a> API.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
